<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFTA Metro Rail Service Alert</title>
  <style>
    :root {
      --bg1: #0b1f3a;
      --bg2: #12345c;
      --accent: #ffcc00;
      --text: #ffffff;
      --subtle: rgba(255,255,255,0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3vw;
    }

    .sign {
      width: 100%;
      height: 100%;
      border: 0.4vw solid var(--accent);
      border-radius: 1.5vw;
      padding: 3vw;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 2vw;
      background: rgba(0, 0, 0, 0.18);
      box-shadow: 0 0 0 0.3vw rgba(255,255,255,0.08) inset;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--accent);
      color: #111;
      font-weight: 800;
      font-size: 3.2vw;
      letter-spacing: 0.08em;
      border-radius: 1vw;
      padding: 1.2vw 1vw;
      text-transform: uppercase;
    }

    .message {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      font-size: 3vw;
      line-height: 1.3;
      padding: 1vw 2vw;
      border-radius: 1vw;
      background: var(--subtle);
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.6vw;
      font-weight: 600;
      opacity: 0.9;
      letter-spacing: 0.04em;
    }

    @media (orientation: portrait) {
      .header { font-size: 5vw; }
      .message { font-size: 4.2vw; }
      .footer { font-size: 2.4vw; }
    }
  </style>
</head>
<body>
  <div class="sign">
    <div class="header">Service Alert</div>

    <div class="message">
    The train is delayed. See Frank for details.
    </div>

    <div class="footer">Please allow extra travel time.</div>
  </div>
</body>
</html>
